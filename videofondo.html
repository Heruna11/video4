<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Fondo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    overflow:hidden;
}

video{
    position:fixed;
    right:0;
    bottom:0;
    min-width:100%;
    min-height:100%;
    object-fit:cover;
    z-index:-1;
    filter:brightness(40%);
}

.overlay{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.contenido{
    background:rgba(0,0,0,.5);
    border:2px solid black;
    padding:40px;
    border-radius:20px;
}

.overlay h1{
    color:white;
    font-size:80px;
    letter-spacing:4px;
    margin-bottom:20px;
}

.overlay p{
    color:#d1d5db;
    font-size:22px;
}

</style>
</head>

<body>

<video autoplay muted loop>

    <source src="medusas.mp4" type="video/mp4">

</video>

<div class="overlay">

    <div class="contenido">

        <h1>VIDEO DE FONDO</h1>

       
    </div>

</div>

</body>
</html>
